services:

  postgres:
    image: postgres:16
    container_name: cloudnest-postgres

    environment:
      POSTGRES_DB: cloudnest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Befeelg15!

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio

    container_name: cloudnest-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

volumes:

  postgres_data:

  minio_data: